- name: Obtener running-config de switches Cisco
  hosts: switches
  gather_facts: no
  vars:
    remote_server: aap-cn01.ipexlab.local
  tasks:
    - name: Ejecutar show running-config
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: output
    - name: Guardar output en archivo local
       copy:
        content: "{{ output.stdout[0] }}"
        dest: "backup/{{ inventory_hostname }}_running_config.txt"
      delegate_to: aap-cn01.ipexlab.local
